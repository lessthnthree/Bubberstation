author: "SomeCabbage"
delete-after: True
changes:
  - rscadd: "Added a bunch of alternative additional weapon and equipment upgrade options to security, allowing a little bit of difference in the late-game arsenal or general armament."
  - rscadd: "Adds the WT-550-B and WT-550-C, upgrades to the classic autorifle."
  - rscadd: "The WT550 can now also be sawn-off."
  - rscadd: "Adds the Stingballer, a close range weapon that rapidly shoots stingballs."
  - rscadd: "Adds the Stunstaff, an aura-farming alternative to the classic baton and shield."
  - rscadd: "Adds the Advanced Energy SMG, an a modified AEG that gains rapid-fire capabilites."
  - rscadd: "Adds the Security Juggernaut suit, an impossibly slow suit that hinders your movement but has some of the best armour you'll ever see."
  - rscadd: "Adds the .38 battle rifle, a simplified NT-38 Battle Rifle. Lacks the combat improvements, but does not degrade."
  - balance: "The Horizon Beam Rifle's performance has been tweaked. Damage is now 110, with 35 armor penetration and a demolition mod of 2, as well as the ability to destroy walls like pulse rifles."
  - rscadd: "The Kiboko and pneumatic grenade launcher can be bought from cargo now."
  - rscdel: "The WT-551 has be completely removed and replaced with the WT-550"
  - rscdel: "Any instances of Skyrat's ammunition naming system have been wiped. Please report any inconsistencies you may find."