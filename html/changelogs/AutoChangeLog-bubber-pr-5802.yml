author: "Moldb, Cerberushopeless, Dr.arielpro & Projectkepler-RU"
delete-after: True
changes:
  - rscadd: "Added 3 new unique biomass based machinery intended for ghost roles only. They are functionally similar to cargo-orderable biogens (Organic Ration Printer, Organic Material Printer, Colonial Supply Core, Wall Med-Station) but are consolidated into much more specific roles, while also adding additional items to their lists."
  - rscadd: "Added an additional spawner to Lizard's Gas, in the form of a manager role."
  - rscadd: "Gave Lizard's Gas their own budget card, which can only be spent through trading with others. Their card is actually capable of withdrawals."
  - image: "New sprites used by the new biogens, taking direct inspiration from pre-existing machines to fit in nicely."
  - map: "Near complete rework of the Lizard Gas station, making it much more roomy and more akin to an European service station."