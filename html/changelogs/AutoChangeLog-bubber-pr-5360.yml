author: "ArrisFairburne"
delete-after: True
changes:
  - rscadd: "Way, way too many blacksmith job features & smithing system changes to list. But here's the highlights:"
  - balance: "Forged blacksmith weapons can now be used nonlethally via striking with pommels, spear shafts, etc. which knocks down victims and stamina damages them like a weaker baton."
  - qol: "Blacksmith tongs now only pull one item at a time, if used on a stackable item."
  - qol: "Blacksmiths can now auto-smith at an anvil by right clicking with a hammer."
  - qol: "Blacksmithing tools now have more tooltips to tutorialize their usage."
  - qol: "Blacksmithing crafting bench can now store item stacks, forging plates, and forging chains. Right-click to view what's in it."
  - balance: "Removed multi-anvil smithing. Individual smithing pieces can now be made faster with the smithing chip and other means to compensate."
  - rscadd: "Blacksmiths can now build a single action revolver if they are fully levelled."
  - rscadd: "Blacksmiths can build a variety of new equipment at the crafting bench -- gun-charging holsters, knife belts, multiple types of scabbards, and even a new expanded-storage botany bag."
  - rscadd: "Replaced the water barrel for smithing with a barrel of smithing oil; smithing oil is now used to grant the bonuses that was previously given by leaving the item unimbued. The new barrel can have its contents changed for reagent imbuing."
  - rscadd: "A new reagent \"smithing oil\" which gives innate bonuses to any blacksmith equipment imbued using it."
  - balance: "Material types now affect the quality of resulting items and how quickly they can be forged."
  - balance: "The reagent smithing hammer now has increased toolspeed if forged well."
  - balance: "Reagent imbuing's durability penalty has been altered; it reduces durability for each time an imbue effect procs, and then stops functioning for such when below a certain durability percentage."